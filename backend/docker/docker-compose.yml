services:
  postgres:
    image: postgres:16-alpine
    container_name: smartdrive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartdrive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartdrive}
      POSTGRES_DB: ${POSTGRES_DB:-smartdrive}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - smartdrive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartdrive}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  smartdrive_postgres_data:
    name: smartdrive_postgres_data
